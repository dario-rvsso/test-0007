name: Reusable Deploy
on: 
  workflow_call:
    inputs:
      artifact-name:
        description: Name of artifact
        required: false
        default: dist
        type: string
    secrets:
      some-secret:
        required: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
      - name: List files
        run: ls -R
      - name: Check secret
        run: |
          if [ "${{ secrets.some-secret}}" = "Some_Secret" ]; then echo "Secret matches"; else echo "Secret does not match"; fi
      - name: Output info
        run: echo "Deploying..."
